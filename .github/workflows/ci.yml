name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
          cache: true

      - name: Verify Formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'."
            exit 1
          fi

      - name: Run Tests
        run: go test -v ./...

      - name: Build Windows
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o intune-management-windows-amd64.exe ./cmd/intune-management

      - name: Build Linux (amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o intune-management-linux-amd64 ./cmd/intune-management

      - name: Build macOS (Intel)
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -o intune-management-darwin-amd64 ./cmd/intune-management

      - name: Build macOS (Apple Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o intune-management-darwin-arm64 ./cmd/intune-management

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intune-management-binaries
          path: |
            intune-management-windows-amd64.exe
            intune-management-linux-amd64
            intune-management-darwin-amd64
            intune-management-darwin-arm64
          retention-days: 7
